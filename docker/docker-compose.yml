version: '3.8'

services:
  # CryptoFlow AI App
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cryptoflow-ai
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - OPENCLAW_URL=http://host.docker.internal:18789
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cryptoflow-network

  # Nginx (optional, for SSL termination)
  nginx:
    image: nginx:alpine
    container_name: cryptoflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - cryptoflow-network
    profiles:
      - production

networks:
  cryptoflow-network:
    driver: bridge
